name: CI/CD Pipeline - Docker Build & Push

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Étape A - Récupération du code
      uses: actions/checkout@v4

    - name: Étape B - Connexion à l'étagère GitHub (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Étape C - Préparation du nom de l'image
      run: |
        REPO_LOWERCASE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=$REPO_LOWERCASE" >> $GITHUB_ENV

    - name: Étape D - Construction de l'image Docker
      run: docker build -t ${{ env.IMAGE_NAME }}:latest .

    - name: Étape E - Envoi sur le registre (Push)
      run: docker push ${{ env.IMAGE_NAME }}:latest